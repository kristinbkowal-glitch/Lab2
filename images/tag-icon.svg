<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150" role="img" aria-labelledby="tagIconTitle">
    <title id="tagIconTitle">A price-tag icon reading name equals value, representing an HTML attribute</title>
    <rect x="0" y="0" width="200" height="150" fill="#ffffff" stroke="#000000" stroke-width="2"></rect>
    <polygon points="20,75 90,20 180,20 180,130 90,130" fill="none" stroke="#000000" stroke-width="4"></polygon>
    <circle cx="45" cy="75" r="8" fill="#000000"></circle>
    <text x="120" y="65" font-size="20" text-anchor="middle" fill="#000000">name</text>
    <text x="120" y="90" font-size="20" text-anchor="middle" fill="#000000">=</text>
    <text x="120" y="115" font-size="18" text-anchor="middle" fill="#000000">"value"</text>
</svg>
