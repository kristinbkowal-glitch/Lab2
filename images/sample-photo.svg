<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250" role="img" aria-labelledby="samplePhotoTitle">
    <title id="samplePhotoTitle">A simple line drawing of a sunrise over three mountains, with a bird in the sky</title>
    <rect x="0" y="0" width="400" height="250" fill="#ffffff" stroke="#000000" stroke-width="2"></rect>
    <circle cx="200" cy="90" r="40" fill="none" stroke="#000000" stroke-width="3"></circle>
    <polygon points="20,220 110,110 200,220" fill="none" stroke="#000000" stroke-width="3"></polygon>
    <polygon points="150,220 240,90 330,220" fill="none" stroke="#000000" stroke-width="3"></polygon>
    <polygon points="260,220 340,140 400,220" fill="none" stroke="#000000" stroke-width="3"></polygon>
    <path d="M60,50 q10,-10 20,0 q10,-10 20,0" fill="none" stroke="#000000" stroke-width="3"></path>
</svg>
